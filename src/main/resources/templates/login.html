<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity4">
<head>
    <title>3R Marketing - Login</title> 
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <link rel="stylesheet" type="text/css" th:href="@{/css/bootstrap.min.css}">
</head> 

<body class="d-flex justify-content-center align-items-center vh-100 bg-body-tertiary">
    <div class="card p-4 shadow" style="width: 22rem;">
        <div class="w-50 m-auto p-3">
            <img th:src="@{/img/3r512.png}" src="../static/img/3r512.png" class="card-img-top" alt="3R Marketing">
        </div>
        <h3 class="card-title mb-3 text-center">Login to 3R Marketing</h3>
        <form th:action="@{/login}" method="post" hx-target="body">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <div th:if="${param.error}" class="alert alert-danger" role="alert">
                Invalid username or password.
            </div>
            <div th:if="${param.logout}" class="alert alert-success" role="alert">
                You have been logged out successfully.
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
    </div>
</body>
</html>
