<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="content">

    <input type="hidden" id="csrf" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    <div th:replace="~{fragments/breadcrumbs :: breadcrumbs(${breadcrumbs})}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3 align-self-center">
        <h1 class="fs-5">Invoice List</h1>
        <div>
            <button hx-get="/invoices/create" hx-target="#content" class="btn btn-primary">Create Invoice</button>
        </div>
    </div>

    <div th:fragment="invoice-table" id="invoice-table" th:with="invoice=${invoices.getContent()}">
        <div class="card overflow-hidden mb-3">
            <div class="table-responsive">
                <table class="table mb-0">
                    <thead class="table-secondary">
                        <tr>
                            <th>ID</th>
                            <th>Customer Name</th>
                            <th>Invoice Date</th>
                            <th class="text-end">Total</th>
                            <th>Status</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="invoice,invoiceStat : ${invoice}">
                            <td th:text="${invoice.id}">1</td>
                            <td th:text="${invoice.customerName}">Customer A</td>
                            <td th:text="${invoice.invoiceDate}">2024-01-01</td>
                            <td class="text-end" th:text="${#numbers.formatDecimal(invoice.total, 1,'COMMA', 2, 'POINT')}">100,000</td>
                            <td th:id="|invoice-status-${invoiceStat.index}|">
                                <span th:if="${invoice.status == 'DRAFT'}" class="badge text-bg-dark" >Draft</span>
                                <span th:if="${invoice.status == 'APPROVED'}" class="badge text-bg-success" >Approved</span>
                                <span th:if="${invoice.status == 'REJECTED'}" class="badge text-bg-danger" >Rejected</span>
                            </td>
                            <td>
                                <button class="btn btn-sm btn-light" th:hx-get="@{/invoices/{id}(id=${invoice.id})}" hx-target="#content" title="View"><i class="bi bi-eye"></i></button>
                                <button th:if="${invoice.status == 'DRAFT'}" class="btn btn-sm btn-light" th:hx-get="@{/invoices/{id}/edit(id=${invoice.id})}" hx-target="#content" title="Edit"><i class="bi bi-pencil-square"></i></button>
                                <button th:if="${invoice.status == 'DRAFT'}" class="btn btn-sm btn-light" th:hx-post="@{/invoices/{id}/approve(id=${invoice.id})}" hx-target="closest td" hx-include="#csrf" th:hx-headers='|{"X-Approvemode":"inline","X-oob-target":"invoice-status-${invoiceStat.index}"}|' hx-confirm="Are you sure?" title="Approve"><i class="bi bi-check-lg"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div th:replace="~{fragments/pagination :: pagination(target='#invoice-table', baseUrl='/invoices', page=${invoices})}"></div>

    </div>

    <div id="toast"></div>

</div>
</html>
