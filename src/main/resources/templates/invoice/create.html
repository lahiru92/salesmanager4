<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div div th:fragment="content">
    <h1 class="mt-5">Create Invoice</h1>

    <form th:object="${invoiceLineDto}" hx-post="/invoices/save" 
        th:classappend="${#fields.hasErrors()}? 'was-validated'" th:fragment="invoice-create-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <!-- Header information -->
        <div class="card bg-body-tertiary mb-4 needs-validation" id="invoiceheader">
            <div class="container p-4">
                <div class="row g-3">
                    <div class="col-md">
                        <label for="invoiceNo" class="form-label">Invoice No</label>
                        <input type="text" minlength="5" maxlength="10" class="form-control" id="invoiceNo"
                            name="invoiceNo" required>
                        <div class="invalid-feedback">Please provide a valid invoice number (5-10 characters).
                        </div>
                    </div>
                    <div class="col-md">
                        <label for="invoiceDate" class="form-label">Date</label>
                        <input type="date" class="form-control" id="invoiceDate" name="invoiceDate">
                    </div>
                    <div class="col-md">
                        <label for="salesman" class="form-label">Salesman</label>
                        <!-- <input type="text" class="form-control" id="salesman" name="salesman"> -->
                        <div th:replace="~{fragments/combobox :: combobox('salesman','/employees/list', ${ {'employeeId':''} }, '')}"></div>
                    </div>
                    <div class="col-md">
                        <label for="retailer" class="form-label">Retailer</label>
                        <!-- <input type="text" class="form-control" id="retailer" name="retailer"> -->
                        <div th:replace="~{fragments/combobox :: combobox('retailer','/retailers/list', ${ {'retailerId':''} }, '')}"></div>
                    </div>
                </div>
            </div>
        </div>



        <!-- Items Table -->
        <!-- <div class="card p-2 bg-body-tertiary mb-4"> -->
            <table class="table table-responsive table-hover table-light table-borderless">
                <thead class="table-secondary" style="position:sticky;top:0">
                    <tr>
                        <th class="col-4">Item</th>
                        <th>Quantity</th>
                        <th>Free Qty</th>
                        <th>Price</th>
                        <th>Discount</th>
                        <th>Subtotal</th>
                        <th></th>
                    </tr>
                </thead>

                <tbody th:remove="all-but-first" th:fragment="invoice-items">
                    <tr>
                        <td><input type="text" class="form-control" value="Item 1" readonly></td>
                        <td><input type="text" class="form-control" value="2" readonly></td>
                        <td><input type="text" class="form-control" value="0" readonly></td>
                        <td><input type="text" class="form-control" value="100.00" readonly></td>
                        <td><input type="text" class="form-control" value="10.00" readonly></td>
                        <td><input type="text" class="form-control" value="9,999,999.99" readonly></td>
                        <td><input type="button" class="btn btn-outline-danger" value="Delete"></td>
                    </tr>
                    <tr>
                        <td><input type="text" class="form-control" value="1" readonly></td>
                        <td><input type="text" class="form-control" value="1" readonly></td>
                        <td><input type="text" class="form-control" value="0" readonly></td>
                        <td><input type="text" class="form-control" value="200.00" readonly></td>
                        <td><input type="text" class="form-control" value="20.00" readonly></td>
                        <td><input type="text" class="form-control" value="180.00" readonly></td>
                        <td><input type="button" class="btn btn-outline-danger" value="Delete"></td>
                    </tr>

                </tbody>
                <tfoot id="invoice-new-item">
                    <tr class="combobox-oob-parent">
                        <td><div th:replace="~{fragments/combobox :: combobox('itemName','/inventory/itemlist',${ {'itemId':0,'batchId':0,'itemName':''} },'')}"></div></td>
                        <td><input type="text" class="form-control combobox-oob-reset" id="qty" name="qty" 
                            hx-post="/invoices/recalculate" 
                            hx-target="#invoice-new-item" 
                            hx-swap="innerHTML"
                            hx-trigger="keyup changed delay:500ms" 
                            hx-params="not *"
                            hx-include="#invoice-new-item"></td>
                        <td><input type="text" class="form-control combobox-oob-reset" id="freeQty" name="freeQty"></td>
                        <td><input type="text" class="form-control combobox-oob-itemPrice" id="price" name="price"></td>
                        <td><input type="text" class="form-control combobox-oob-reset" id="discount" name="discount"></td>
                        <td colspan="2"><input type="button" class="btn btn-primary" value="Add Item"></td>
                    </tr>
                </tfoot>
            </table>
        <!-- </div> -->


        <!-- Item entry -->
        <!-- <div class="card bg-body-tertiary mb-4">

                    <button class="btn btn-primary mb-3" type="button">Add Item</button>
                </div>
            </div>
            </div>
            </div> -->

        <!-- Payment information -->
        <div class="card bg-body-tertiary mb-4 needs-validation">
            <h5 class="card-header">Payment Information</h5>
            <div class="container p-4">
                <div class="row g-3 mb-2">
                    <div class="col-md-4">
                        <label for="cashPaid" class="form-label">Cash Paid</label>
                        <input type="text" class="form-control" id="cashPaid" name="cashPaid">
                    </div>
                </div>
                <div class="row g-3 mb-2">
                    <div class="col-md-4">
                        <label for="credit" class="form-label">Credit</label>
                        <input type="text" class="form-control" id="credit" name="credit">
                    </div>
                    <div class="col-md-4">
                        <label for="creditDue" class="form-label">Due date</label>
                        <input type="date" class="form-control" id="creditDue" name="creditDue">
                    </div>
                </div>
                <div class="row mt-4">
                    <p>Cheques</p>
                    <div class="col">
                        <table class="table table-sm">
                            <thead>
                                <tr>
                                    <th>Cheque No</th>
                                    <th>Bank</th>
                                    <th>Date</th>
                                    <th>Amount</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>12345</td>
                                    <td>Commercial Bank</td>
                                    <td>25/12/2025</td>
                                    <td>2,332,124.99</td>
                                    <td><button class="btn btn-outline-danger" type="button">Remove</button>
                                    </td>
                                </tr>
                                <tr>
                                    <td><input type="text" class="form-control" id="chequeNo" name="chequeNo">
                                    </td>
                                    <td><input type="text" class="form-control" id="bank" name="bank"></td>
                                    <td><input type="date" class="form-control" id="chequeDate"
                                            name="chequeDate">
                                    </td>
                                    <td><input type="text" class="form-control" id="chequeAmount"
                                            name="chequeAmount"></td>
                                    <td><button class="btn btn-secondary" type="button">Add Cheque</button></td>
                                </tr>
                        </table>
                    </div>
                </div>
            </div>

            <div class="card-footer">
                <h4>Total Paid: 3,422,344.33</h4>
            </div>
        </div>

        <button class="btn btn-primary btn-lg mb-5" type="submit" id="submitBtn"
        onclick="validate()"
        >Save Invoice</button>
        <div style="height:500px"></div>
        <div id="test"></div>
    </form>
</div>
</html>
