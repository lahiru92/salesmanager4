<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-3 mt-3">
        <h1 class="fs-5 m-0">Dashboard</h1>
        <span class="text-secondary" th:text="${#temporals.format(today, 'EEEE, dd MMMM yyyy')}"></span>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 row-cols-xxl-5 g-3 mb-3">

        <div class="col">
            <a class="card text-decoration-none h-100" hx-get="/invoices" hx-target="#content" role="button">
                <div class="card-body d-flex justify-content-between align-items-start">
                    <div>
                        <div class="text-secondary text-uppercase small">Sales today</div>
                        <div class="fs-4 fw-bold" th:text="${#numbers.formatDecimal(stats.salesToday, 1, 'COMMA', 2, 'POINT')}"></div>
                        <div class="small text-secondary" th:text="|${stats.invoicesToday} invoice(s) approved|"></div>
                    </div>
                    <i class="bi bi-receipt fs-3 text-secondary"></i>
                </div>
            </a>
        </div>

        <div class="col">
            <a class="card text-decoration-none h-100" hx-get="/debtors" hx-target="#content" role="button">
                <div class="card-body d-flex justify-content-between align-items-start">
                    <div>
                        <div class="text-secondary text-uppercase small">Collections today</div>
                        <div class="fs-4 fw-bold" th:text="${#numbers.formatDecimal(stats.collectionsToday, 1, 'COMMA', 2, 'POINT')}"></div>
                        <div class="small text-secondary" th:text="|Cash: ${#numbers.formatDecimal(stats.cashCollectedToday, 1, 'COMMA', 2, 'POINT')}|"></div>
                    </div>
                    <i class="bi bi-cash-stack fs-3 text-secondary"></i>
                </div>
            </a>
        </div>

        <div class="col">
            <a class="card text-decoration-none h-100" hx-get="/debtors" hx-target="#content" role="button">
                <div class="card-body d-flex justify-content-between align-items-start">
                    <div>
                        <div class="text-secondary text-uppercase small">Receivables</div>
                        <div class="fs-4 fw-bold" th:text="${#numbers.formatDecimal(stats.receivablesTotal, 1, 'COMMA', 2, 'POINT')}"></div>
                        <div class="small text-secondary" th:text="|${stats.openInvoiceCount} open invoice(s)|"></div>
                    </div>
                    <i class="bi bi-journal-arrow-down fs-3 text-secondary"></i>
                </div>
            </a>
        </div>

        <div class="col">
            <a class="card text-decoration-none h-100" hx-get="/creditors" hx-target="#content" role="button">
                <div class="card-body d-flex justify-content-between align-items-start">
                    <div>
                        <div class="text-secondary text-uppercase small">Payables</div>
                        <div class="fs-4 fw-bold" th:text="${#numbers.formatDecimal(stats.payablesTotal, 1, 'COMMA', 2, 'POINT')}"></div>
                        <div class="small text-secondary" th:text="|${stats.openGrnCount} open GRN(s)|"></div>
                    </div>
                    <i class="bi bi-journal-arrow-up fs-3 text-secondary"></i>
                </div>
            </a>
        </div>

        <div class="col">
            <a class="card text-decoration-none h-100" hx-get="/cash-balancing" hx-target="#content" role="button">
                <div class="card-body d-flex justify-content-between align-items-start">
                    <div>
                        <div class="text-secondary text-uppercase small">Cash drawer</div>
                        <div class="fs-4">
                            <span th:if="${stats.drawerStatus == 'CLOSED'}" class="badge text-bg-success">Closed</span>
                            <span th:if="${stats.drawerStatus == 'REOPENED'}" class="badge text-bg-warning">Reopened</span>
                            <span th:if="${stats.drawerStatus == 'OPEN'}" class="badge text-bg-dark">Open</span>
                        </div>
                        <div class="small"
                            th:classappend="${stats.pendingHandovers > 0} ? 'text-danger' : 'text-secondary'"
                            th:text="${stats.pendingHandovers > 0} ? |${stats.pendingHandovers} handover(s) pending| : 'All handovers verified'"></div>
                    </div>
                    <i class="bi bi-currency-dollar fs-3 text-secondary"></i>
                </div>
            </a>
        </div>

    </div>

</div>
</html>
