<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="content" th:object="${grn}" th:class="grn" th:data-init="grn">

    <div th:replace="~{fragments/breadcrumbs :: breadcrumbs(${breadcrumbs})}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3 align-self-center">
        <h1 class="fs-5" th:if="${mode == 'create'}">Create GRN</h1>
        <h1 class="fs-5" th:if="${mode == 'edit'}">Edit GRN</h1>
        <h1 class="fs-5" th:if="${mode == 'view'}" th:text="'GRN #' + ${grn.id}"></h1>
        <div>
            <a hx-post="/grn/submit" hx-target="#content" class="btn btn-outline-secondary" th:if="*{status == 'DRAFT'}">Submit for Approval</a>
            <a hx-post="/grn" hx-target="#content" hx-include="#grn-form" class="btn btn-primary">Save</a>
        </div>
    </div>

    <div th:if="${message}">
        <script th:inline="javascript">
            Toastify({
                text: /*[[${message}]]*/"Undefined",
                duration: 3000
            }).showToast();
        </script>
    </div>

    <div th:fragment="grn">
        <form hx-post="/grn" hx-target="#content" id="grn-form" class="needs-validation" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" th:field="*{id}" th:if="${mode == 'edit'}">
            <div class="row p-2 mb-3">
                <div th:if="${mode == 'edit'}" class="col-3">
                    <label class="form-label" for="id">ID</label>
                    <input class="form-control" type="text" id="id" th:field="*{id}" disabled/>
                </div>
                <div th:if="${purchaseOrderId != null}" class="col-3">
                    <label class="form-label" for="purchaseOrderId">Purchase Order Id</label>
                    <input class="form-control" type="text" id="purchaseOrderId" th:field="${purchaseOrderId}" disabled/>
                </div>
                <div class="col-3">
                    <label class="form-label" for="supplier">Supplier</label>
                    <input type="hidden" th:field="*{supplierName}">
                    <select id="supplier" type="text" placeholder="Supplier" class="form-select" th:field="*{supplierId}"
                        th:classappend="${#fields.hasErrors('supplierId')} ? 'is-invalid' : ''"
                     required>
                        <option th:if="*{supplierName != null}" th:value="*{supplierId}" th:text="${supplierName}"></option>
                    </select>

                    <div class="invalid-feedback" th:if="${#fields.hasErrors('supplierId')}" th:errors="*{supplierId}"></div>
                    <div class="invalid-feedback" th:unless="${#fields.hasErrors('supplierId')}">Supplier is required</div>
                    
                </div>
                
                <div class="col-3">
                    <label class="form-label" for="receivedDate">Received Date</label>
                    <input class="form-control" type="date" th:field="*{receivedDate}" required/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('receivedDate')}" th:errors="*{receivedDate}"></div>
                    <div class="invalid-feedback" th:unless="${#fields.hasErrors('receivedDate')}">Received Date is required</div>
                    
                </div>
            </div>

            <div class="card overflow-hidden shadow-sm">
                <div class="table-responsive">
                    <table class="table">
                        <thead class="table-secondary">
                            <tr>
                                <th>Item</th>
                                <th>Ordered Qty</th>
                                <th>Received Qty</th>
                                <th>Rejected Qty</th>
                                <th>Accepted Qty</th>
                                <th>Ordered Price</th>
                                <th>Unit Price</th>
                                <th>Sub Total</th>
                                <th></th>
                            </tr>
                        </thead>
        
                        <tbody id="grn-row-container">
                            <tr th:each="item,itemStat : *{items}" class="grn-row">
                                <td>
                                    <input type="text" class="form-control-plaintext" th:field="*{items[__${itemStat.index}__].name}" readonly></input>
                                    <input class="grn-input itemid" type="hidden" th:field="*{items[__${itemStat.index}__].itemId}">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('items[' + itemStat.index + '].itemId')}" 
                                       th:errors="*{items[__${itemStat.index}__].itemId}"></div>
                                </td>
                                <td >
                                    <input type="text" class="ordered-qty form-control-plaintext" th:field="*{items[__${itemStat.index}__].orderedQty}" readonly> 
                                </td>
                                <td>
                                    <input type="text" class="received-qty form-control-plaintext" th:field="*{items[__${itemStat.index}__].receivedQty}" readonly> 
                                </td>
                                <td>
                                    <input type="text" class="rejected-qty" th:field="*{items[__${itemStat.index}__].rejectedQty}">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('items[' + itemStat.index + '].rejectedQty')}" 
                                       th:errors="*{items[__${itemStat.index}__].rejectedQty}"></div>   
                                </td>
                                <td>
                                    <input type="text" class="accepted-qty" th:field="*{items[__${itemStat.index}__].acceptedQty}">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('items[' + itemStat.index + '].acceptedQty')}" 
                                       th:errors="*{items[__${itemStat.index}__].acceptedQty}"></div>   
                                </td>
                                
                                <td>
                                    <input type="text" class="ordered-price form-control-plaintext" th:field="*{items[__${itemStat.index}__].orderedPrice}" readonly> 
                                </td>
                                <td>
                                    <input type="text" class="grn-input price" th:field="*{items[__${itemStat.index}__].price}" data-action="grn:subtotal">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('items[' + itemStat.index + '].price')}" 
                                       th:errors="*{items[__${itemStat.index}__].price}"></div>
                                </td>
                                <td class="subtotal" th:if="${item.price != null and item.acceptedQty != null}" th:text="${item.price * item.acceptedQty}"></td>
                                <td><button class="btn btn-outline-danger" type="button" data-action="grn:remove-item"><i class="bi bi-trash"></i></button></td>
                            </tr>
                        </tbody>
        
                        <tfoot>
                            <tr>
                                <td>
                                    <select id="f-id">
                                    </select>
                                </td>
                                <td></td>
                                <td><input class="form-control" data-action="grn:subtotal" id="f-received-qty" type="number"/></td>
                                <td><input class="form-control" data-action="grn:subtotal" id="f-rejected-qty" type="number"/></td>
                                <td><input class="form-control" id="f-accepted-qty" type="number" readonly/></td>
                                <td></td>
                                <td><input class="form-control" data-action="grn:subtotal" id="f-price" type="number"/></td>
                                <td><input class="form-control" id="f-subtotal" type="number" placeholder="Sub Total" readonly/></td>
                                <td><button class="btn btn-primary" type="button" data-action="grn:add-item"><i class="bi bi-plus"></i></button></td>
                            </tr>
                            
                            <tr>
                                <td colspan="7" class="text-end">Grand Total:</td>
                                <td id="grand-total" colspan="2" th:text="*{getGrandTotal()}">0</td>
                            </tr>
                        </tfoot>
                    </table>

                    <template id="grn-row-template">
                        <tr class="grn-row">
                            <td>
                                <input type="text" class="form-control-plaintext item-name" readonly></input>
                                <input class="grn-input item-id" type="hidden">
                                <div class="invalid-feedback item-error"></div>
                            </td>
                            <td >
                                <input type="text" class="ordered-qty form-control-plaintext" readonly> 
                            </td>
                            <td>
                                <input type="text" class="received-qty form-control"> 
                            </td>
                            <td>
                                <input type="text" class="rejected-qty form-control">
                                <div class="invalid-feedback rejected-qty-error"></div>   
                            </td>
                            <td>
                                <input type="text" class="accepted-qty form-control-plaintext">
                                <div class="invalid-feedback accepted-qty-error"></div>   
                            </td>
                            
                            <td>
                                <input type="text" class="ordered-price form-control-plaintext" readonly> 
                            </td>
                            <td>
                                <input type="text" class="grn-input price form-control">
                                <div class="invalid-feedback price-error"></div>
                            </td>
                            <td class="subtotal"></td>
                            <td><button class="btn btn-outline-danger" type="button" data-action="grn:remove-item"><i class="bi bi-trash"></i></button></td>
                        </tr>
                    </template>
    
                </div>
            </div>
        
        </form>
    </div>
    
</div>



</html>
