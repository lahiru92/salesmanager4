<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="content">

    <div th:replace="~{fragments/breadcrumbs :: breadcrumbs(${breadcrumbs})}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3 align-self-center">
        <h1 class="fs-5">
            <span th:text="${view.title}"></span>
            <small class="text-secondary ms-2" th:text="${view.periodLabel}"></small>
        </h1>
        <div>
            <a class="btn btn-outline-secondary" th:href="@{'/reports/' + ${type.key} + '/pdf?' + ${queryString}}">
                <i class="bi bi-file-earmark-pdf"></i> PDF
            </a>
            <a class="btn btn-outline-secondary" th:href="@{'/reports/' + ${type.key} + '/csv?' + ${queryString}}">
                <i class="bi bi-file-earmark-spreadsheet"></i> CSV
            </a>
        </div>
    </div>

    <form th:if="${type.hasDateRange or type.hasGrouping or type.hasHorizon}"
        th:hx-get="@{'/reports/' + ${type.key}}" hx-target="#content"
        class="card mb-3">
        <div class="card-body row align-items-end g-2">
            <div class="col-auto" th:if="${type.hasDateRange}">
                <label class="form-label" for="from">From</label>
                <input type="date" class="form-control" id="from" name="from" th:value="${params.from}">
            </div>
            <div class="col-auto" th:if="${type.hasDateRange}">
                <label class="form-label" for="to">To</label>
                <input type="date" class="form-control" id="to" name="to" th:value="${params.to}">
            </div>
            <div class="col-auto" th:if="${type.hasGrouping}">
                <label class="form-label" for="grouping">Group by</label>
                <select class="form-select" id="grouping" name="grouping">
                    <option value="month" th:selected="${params.grouping == 'month'}">Month</option>
                    <option value="quarter" th:selected="${params.grouping == 'quarter'}">Quarter</option>
                </select>
            </div>
            <div class="col-auto" th:if="${type.hasHorizon}">
                <label class="form-label" for="horizon">Due within</label>
                <select class="form-select" id="horizon" name="horizon">
                    <option value="7" th:selected="${params.horizon == 7}">7 days</option>
                    <option value="14" th:selected="${params.horizon == 14}">14 days</option>
                    <option value="30" th:selected="${params.horizon == 30}">30 days</option>
                </select>
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-primary">Apply</button>
            </div>
        </div>
    </form>

    <div th:each="table : ${view.tables}" class="card overflow-hidden mb-3">
        <div class="card-header" th:if="${table.title != null}">
            <h5 class="fs-6 m-0" th:text="${table.title}"></h5>
        </div>
        <div class="card-body table-responsive p-0">
            <table class="table table-striped m-0">
                <thead>
                    <tr class="text-uppercase">
                        <th th:each="col : ${table.columns}" th:classappend="${col.numeric} ? 'text-end' : ''"
                            th:text="${col.header}"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(table.rows)}">
                        <td th:colspan="${#lists.size(table.columns)}" class="text-secondary">No data for the selected period.</td>
                    </tr>
                    <tr th:each="row : ${table.rows}">
                        <td th:each="cell, cellStat : ${row}"
                            th:classappend="${table.columns[cellStat.index].numeric} ? 'text-end' : ''"
                            th:text="${cell}"></td>
                    </tr>
                </tbody>
                <tfoot th:if="${table.totalsRow != null and !#lists.isEmpty(table.rows)}">
                    <tr class="fw-bold">
                        <td th:each="cell, cellStat : ${table.totalsRow}"
                            th:classappend="${table.columns[cellStat.index].numeric} ? 'text-end' : ''"
                            th:text="${cell}"></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

</div>
</html>
