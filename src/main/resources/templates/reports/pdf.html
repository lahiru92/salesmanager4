<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${view.title}">Report</title>
    <style>
        @page { size: A4; margin: 18mm 14mm; }
        body { font-family: Helvetica, Arial, sans-serif; font-size: 9px; color: #222; }
        h1 { font-size: 16px; margin: 0 0 2px 0; }
        h2 { font-size: 11px; margin: 12px 0 4px 0; }
        .meta { color: #666; margin-bottom: 12px; font-size: 9px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 12px; -fs-table-paginate: paginate; }
        th, td { border: 1px solid #bbb; padding: 3px 5px; }
        th { background: #eee; text-align: left; font-size: 8px; text-transform: uppercase; }
        th.num, td.num { text-align: right; }
        tr.totals td { font-weight: bold; background: #f5f5f5; }
        .empty { color: #666; }
    </style>
</head>
<body>
    <h1 th:text="${view.title}">Title</h1>
    <div class="meta">
        <span th:text="${view.periodLabel}">Period</span> &#183;
        Generated <span th:text="${generatedAt}">now</span> &#183; 3R Marketing
    </div>

    <th:block th:each="table : ${view.tables}">
        <h2 th:if="${table.title != null}" th:text="${table.title}">Section</h2>
        <table>
            <thead>
                <tr>
                    <th th:each="col : ${table.columns}" th:classappend="${col.numeric} ? 'num' : ''"
                        th:text="${col.header}">Col</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(table.rows)}">
                    <td th:colspan="${#lists.size(table.columns)}" class="empty">No data for the selected period.</td>
                </tr>
                <tr th:each="row : ${table.rows}">
                    <td th:each="cell, cellStat : ${row}"
                        th:classappend="${table.columns[cellStat.index].numeric} ? 'num' : ''"
                        th:text="${cell}">cell</td>
                </tr>
                <tr class="totals" th:if="${table.totalsRow != null and !#lists.isEmpty(table.rows)}">
                    <td th:each="cell, cellStat : ${table.totalsRow}"
                        th:classappend="${table.columns[cellStat.index].numeric} ? 'num' : ''"
                        th:text="${cell}">total</td>
                </tr>
            </tbody>
        </table>
    </th:block>
</body>
</html>
