<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="content">

    <div th:replace="~{fragments/breadcrumbs :: breadcrumbs(${breadcrumbs})}"></div>

    <div th:if="${message}">
        <script th:inline="javascript">
            Toastify({
                text: /*[[${message}]]*/"Undefined",
                duration: 3000
            }).showToast();
        </script>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3 align-self-center">
        <h1 class="fs-5">Employees</h1>
        <a hx-get="/employees/create" hx-target="#content" class="btn btn-primary">Create Employee</a>
    </div>

    <table class="table align-middle">
        <thead>
            <tr>
                <th>Known Name</th>
                <th>Full Name</th>
                <th>Designation</th>
                <th>Mobile</th>
                <th>Date Joined</th>
                <th></th>
            </tr>
        </thead>

        <tbody>
            <tr th:if="${#lists.isEmpty(employees)}">
                <td colspan="6" class="text-secondary">No employees yet.</td>
            </tr>
            <tr th:each="employee : ${employees}">
                <td th:text="${employee.knownName}"></td>
                <td th:text="${employee.fullName}"></td>
                <td th:text="${employee.designation}"></td>
                <td th:text="${employee.phoneMobile}"></td>
                <td th:text="${employee.dateJoined != null ? #temporals.format(employee.dateJoined, 'dd MMM yyyy') : ''}"></td>
                <td class="text-end">
                    <button th:hx-get="@{/employees/{id}/edit (id=${employee.id}) }" hx-target="#content"
                        class="btn btn-sm btn-light"><i class="bi bi-pencil"></i></button>
                    <button th:hx-delete="@{/employees/{id} (id=${employee.id}) }"
                        th:hx-headers='|{"${_csrf.headerName}": "${_csrf.token}"}|' hx-target="closest tr"
                        hx-swap="outerHTML swap:0.5s" hx-confirm="Are you sure you want to delete this employee?"
                        class="btn btn-sm btn-light"><i class="bi bi-trash"></i> </button>
                </td>
            </tr>
        </tbody>
    </table>

    <div th:replace="~{fragments/pagination :: pagination(target='#content', baseUrl='/employees', page=${page})}"></div>

</div>
</html>
