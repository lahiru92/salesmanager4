<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="pagination(target,baseUrl,page)" class="d-flex justify-content-end align-self-center">
    <nav aria-label="pagination">
      <ul class="pagination m-0">
        <li th:classappend="${page.hasPrevious()?'':'disabled'}" class="page-item">
          <a class="page-link" 
             href="#"
             th:hx-get="@{${baseUrl}(page=${page.getNumber()-1})}" 
             th:hx-target="${target}" 
             aria-label="Previous">
            Previous
          </a>
        </li>
        <li class="page-item" ><a class="page-link" th:text="|Page ${page.getNumber()+1} of ${page.getTotalPages()}|"></a></li>
        <li th:classappend="${page.hasNext()?'':'disabled'}" class="page-item">
          <a class="page-link" 
             href="#"
             th:hx-get="@{${baseUrl}(page=${page.getNumber()+1})}" 
             th:hx-target="${target}"
             aria-label="Next">
            Next
          </a>
        </li>
      </ul>
    </nav>
</div>


</html>
