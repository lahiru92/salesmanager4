<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="content">

    <div th:replace="~{fragments/breadcrumbs :: breadcrumbs(${breadcrumbs})}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3 align-self-center">
        <h1 class="fs-5">Suppliers</h1>
        <a hx-get="/suppliers/create" hx-target="#content" class="btn btn-primary">Create Supplier</a>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Contact Person</th>
                <th>Phone</th>
                <th>Email</th>
                <th></th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="supplier : ${suppliers}">
                <td th:text="${supplier.name}"></td>
                <td th:text="${supplier.contactPerson}"></td>
                <td th:text="${supplier.phone}"></td>
                <td th:text="${supplier.email}"></td>
                <td>
                    <a th:hx-get="@{/suppliers/{id}/edit (id=${supplier.supplierId}) }" hx-target="#content"
                        class="btn btn-sm btn-outline-primary">Edit</a>
                    <a th:hx-delete="@{/suppliers/{id} (id=${supplier.supplierId}) }"
                        th:hx-headers='|{"${_csrf.headerName}": "${_csrf.token}"}|' hx-target="closest tr"
                        hx-swap="outerHTML swap:0.5s" hx-confirm="Are you sure you want to delete this supplier?"
                        class="btn btn-sm btn-outline-danger"> Delete </a>
                </td>
            </tr>
        </tbody>
    </table>

    <div th:replace="~{fragments/pagination :: pagination(target='#content', baseUrl='/suppliers', page=${page})}"></div>

</div>

</html>
