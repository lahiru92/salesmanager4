<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="content" data-init="user">

    <div th:replace="~{fragments/breadcrumbs :: breadcrumbs(${breadcrumbs})}"></div>

    <h1 class="fs-5">Link employee</h1>

    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

    <form hx-post="/users/link" hx-target="#content">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" name="username" th:value="${user.username}">
        <div class="col-md-6">

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" th:value="${user.username}" disabled>
            </div>

            <div class="mb-3">
                <label for="user-employee" class="form-label">Employee</label>
                <select id="user-employee" name="employeeId" autocomplete="off">
                    <option value="">Not linked</option>
                    <option th:if="${user.employeeId != null}" th:value="${user.employeeId}"
                        th:text="${currentEmployeeName}" selected></option>
                </select>
                <div class="form-text">Leave as "Not linked" to remove the current link.</div>
            </div>

            <button type="submit" class="btn btn-primary">Save</button>
            <a hx-get="/users" hx-target="#content" class="btn btn-outline-secondary">Cancel</a>

        </div>
    </form>

</div>
</html>
