<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div id="change_password_form" th:fragment="content">

    <h2>Change Password</h2>

    <!-- Display error message or success if present -->
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="container">
        <form>
            <div class="row g-3 align-items-center">
                <div class="col">
                    <label class="form-label" for="username">Username</label>
                    <input class="form-control" type="text" id="username" name="username" />
                </div>

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="button" class="btn btn-primary" value="Reset Password" hx-post="/users/reset-password"
                    hx-target="#change_password_form" />

            </div>
        </form>
    </div>
    <div th:if="${tempPassword}" class="alert alert-info mt-3">
        <strong>Temporary Password:</strong> <span th:text="${tempPassword}"></span>
    </div>
    <p>This is for demo purposes only. In a real application, this password would be sent to the user via email.</p>
</div>
