<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div id="reset_password_form" th:fragment="content">

    <div th:replace="~{fragments/breadcrumbs :: breadcrumbs(${breadcrumbs})}"></div>

    <h1 class="fs-5">Reset password</h1>

    <form>
        <div class="col-md-6">
            <div class="mb-3">
                <label class="form-label" for="username">Username</label>
                <input class="form-control" type="text" id="username" name="username" required />
            </div>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="button" class="btn btn-primary" hx-post="/users/reset-password"
                hx-target="#reset_password_form">Reset Password</button>
            <a hx-get="/users" hx-target="#content" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>

    <div th:if="${tempPassword}" class="alert alert-info mt-3 col-md-6">
        <strong>Temporary Password:</strong> <span th:text="${tempPassword}"></span>
        <div class="small text-secondary mt-1">For demo purposes only. In production this would be emailed to the user.</div>
    </div>

</div>
</html>
