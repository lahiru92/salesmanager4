<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="content" data-init="user">

    <div th:replace="~{fragments/breadcrumbs :: breadcrumbs(${breadcrumbs})}"></div>

    <h1 class="fs-5">Create new user</h1>

    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

    <form hx-post="/users/create" hx-target="#content" class="needs-validation" novalidate>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="col-md-6">

            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" th:value="${username}" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>

            <div class="mb-3">
                <label for="user-employee" class="form-label">Linked Employee <span class="text-secondary">(optional)</span></label>
                <select id="user-employee" name="employeeId" autocomplete="off">
                    <option value="">Not linked</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Roles</label>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="admin" name="authorities" value="ADMIN">
                    <label class="form-check-label" for="admin">Admin</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="hr" name="authorities" value="USER">
                    <label class="form-check-label" for="hr">HR</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="manager" name="authorities" value="MANAGER">
                    <label class="form-check-label" for="manager">Manager</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="storekeeper" name="authorities" value="SALESMAN">
                    <label class="form-check-label" for="storekeeper">Storekeeper</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="clerk" name="authorities" value="CLERK">
                    <label class="form-check-label" for="clerk">Clerk</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="salesman" name="authorities" value="STOREKEEPER">
                    <label class="form-check-label" for="salesman">Salesman</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="cashier" name="authorities" value="STOREKEEPER">
                    <label class="form-check-label" for="cashier">Cashier</label>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Create User</button>
            <a hx-get="/users" hx-target="#content" class="btn btn-outline-secondary">Cancel</a>

        </div>
    </form>

</div>
</html>
