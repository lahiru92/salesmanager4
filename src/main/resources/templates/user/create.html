<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Invoice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/combobox.css}" rel="stylesheet" />
    <link th:href="@{/styles.css}" rel="stylesheet" />
</head>

<body class="container-fluid bg-body-secondary">

    <div class="row container-fluid p-0">

        <div class="col-2 p-0">
            <div id="branding" class="text-bg-light pt-3 ps-3">
                <img th:src="@{/img/3r64.png}" src="../static/img/3r64.png" width="32" height="32" class="me-2">
                <span class="fw-semibold">3R Marketing</span>

            </div>
            <nav class="text-bg-light p-3 d-flex flex-column vh-100">

                <a sec:authorize="hasRole('ADMIN')" href="#" class="btn btn btn-light text-start"><i class="bi bi-person"></i><span class="ms-2">Users</span></a>
                <a hx-get="/employees" hx-target="#content" class="btn btn btn-light text-start"><i class="bi bi-person-vcard"></i><span class="ms-2">Employees</span></a>
                <a hx-get="/suppliers" hx-target="#content" class="btn btn btn-light text-start"><i class="bi bi-truck"></i><span class="ms-2">Suppliers</span></a>
                <a hx-get="/customers" hx-target="#content" class="btn btn btn-light text-start"><i class="bi bi-shop-window"></i><span class="ms-2">Customers</span></a>
                <a hx-get="/items" hx-target="#content" class="btn btn btn-light text-start"><i class="bi bi-boxes"></i><span class="ms-2">Items</span></a>
                <a href="#" class="btn btn btn-light text-start"><i class="bi bi-car-front"></i><span class="ms-2">Vehicles</span></a>
                <a href="#" class="btn btn btn-light text-start"><i class="bi bi-map"></i><span class="ms-2">Routes</span></a>
                <a hx-get="/invoice" hx-target="#content"  class="btn btn btn-light text-start"><i class="bi bi-receipt"></i><span class="ms-2">Invoice</span></a>
                <a hx-get="/grn" hx-target="#content" class="btn btn btn-light text-start"><i class="bi bi-journal-arrow-down"></i><span class="ms-2">GRN</span></a>
                <a href="#" class="btn btn btn-light text-start"><i class="bi bi-journal-plus"></i><span class="ms-2">Purchase Order</span></a>
                <a hx-get="/inventory" hx-target="#content" class="btn btn btn-light text-start"><i class="bi bi-list-check"></i><span class="ms-2">Inventory</span></a>
                <a href="#" class="btn btn btn-light text-start"><i class="bi bi-currency-dollar"></i><span class="ms-2">Cash</span></a>
                <a href="#" class="btn btn btn-light text-start"><i class="bi bi-cash-coin"></i><span class="ms-2">Cheques</span></a>
                
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn btn-light text-start"><i class="bi bi-box-arrow-right"></i><span class="ms-2">Log Out</span></button>
                </form>

            </nav>
    

        </div>

        <!-- Main content -->
        <div class="col" id="content" th:fragment="content">
            <div class="p-4">
                <h2 class="mb-4">Create New User</h2>
                <form hx-post="/users/create" hx-target="#content" class="needs-validation">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Roles</label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="admin" name="authorities" value="ADMIN">
                            <label class="form-check-label" for="admin">Admin</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="user" name="authorities" value="USER">
                            <label class="form-check-label" for="user">User</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="manager" name="authorities" value="MANAGER">
                            <label class="form-check-label" for="manager">Manager</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="salesman" name="authorities" value="SALESMAN">
                            <label class="form-check-label" for="salesman">Salesman</label>     
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="clerk" name="authorities" value="CLERK">
                            <label class="form-check-label" for="clerk">Clerk</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="storekeeper" name="authorities" value="STOREKEEPER">
                            <label class="form-check-label" for="storekeeper">Storekeeper</label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Create User</button>
                </form>
            </div>
        </div>

    </div>

    <script type="text/javascript" th:src="@{/htmx-2.0.8.min.js}"></script>
    <script type="text/javascript" th:src="@{/jquery-3.7.1.slim.min.js}"></script>
    <script type="text/javascript" th:src="@{/combobox.js}"></script>
</body>

</html>
