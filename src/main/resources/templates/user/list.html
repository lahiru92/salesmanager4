<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="content">

    <div th:replace="~{fragments/breadcrumbs :: breadcrumbs(${breadcrumbs})}"></div>

    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

    <div th:if="${toastMessage}">
        <script th:inline="javascript">
            Toastify({
                text: /*[[${toastMessage}]]*/"Undefined",
                duration: 3000
            }).showToast();
        </script>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3 align-self-center">
        <h1 class="fs-5">Users</h1>
        <div>
            <a hx-get="/users/reset-password" hx-target="#content" class="btn btn-outline-secondary">Reset Password</a>
            <a hx-get="/users/create" hx-target="#content" class="btn btn-primary">Add User</a>
        </div>
    </div>

    <div class="card overflow-hidden mb-3">
        <div class="table-responsive">
            <table class="table align-middle m-0">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Employee</th>
                        <th>Roles</th>
                        <th>Status</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.username}"></td>
                        <td>
                            <span th:if="${user.employeeId != null}" th:text="${employeeNames.get(user.employeeId)}"></span>
                            <span th:if="${user.employeeId == null}" class="text-secondary">&mdash;</span>
                        </td>
                        <td>
                            <span th:each="auth : ${user.authorities}"
                                  th:text="${auth.getAuthority()}"
                                  class="badge rounded-pill bg-secondary me-1"></span>
                        </td>
                        <td>
                            <span th:if="${user.enabled}" class="badge text-bg-success">Active</span>
                            <span th:unless="${user.enabled}" class="badge text-bg-dark">Inactive</span>
                        </td>
                        <td class="text-end">
                            <a th:hx-get="@{/users/{username}/link (username=${user.username})}" hx-target="#content"
                                class="btn btn-sm btn-light" title="Link employee"><i class="bi bi-person-vcard"></i></a>

                            <button th:if="${user.enabled}" class="btn btn-sm btn-light" title="Deactivate"
                                hx-post="/users/deactivate" hx-target="#content"
                                th:hx-vals='|{"username": "${user.username}"}|'
                                th:hx-headers='|{"${_csrf.headerName}": "${_csrf.token}"}|'><i class="bi bi-person-slash"></i></button>

                            <button th:unless="${user.enabled}" class="btn btn-sm btn-light" title="Activate"
                                hx-post="/users/activate" hx-target="#content"
                                th:hx-vals='|{"username": "${user.username}"}|'
                                th:hx-headers='|{"${_csrf.headerName}": "${_csrf.token}"}|'><i class="bi bi-person-check"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</html>
