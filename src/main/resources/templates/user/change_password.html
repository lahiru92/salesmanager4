<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    
    <div id="change_password_form" th:fragment = "content">

        <h2>Change Password</h2>

        <!-- Display error message or success if present -->
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

        <form>
            <div class="container">
                <div class="row g-3 align-items-center">
                    <div class="col">
                        <label class="form-label" for="currentPassword">Current Password:</label>
                        <input class="form-control" type="password" id="currentPassword" name="currentPassword" required />
                    </div>
                    <div class="col">
                        <label class="form-label" for="newPassword">New Password:</label>
                        <input class="form-control" type="password" id="newPassword" name="newPassword" required />
                    </div>
                    <div class="col">
                        <label class="form-label" for="confirmNewPassword">Confirm New Password:</label>
                        <input class="form-control" type="password" id="confirmNewPassword" name="confirmNewPassword" required />
                        
                    </div>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="col-md">
                        <button th:hx-post="@{/users/change-password}" hx-target="#change_password_form" class="btn btn-primary" type="submit" >Change Password</button>
                    </div>
                </div>
            </div>
        </form>

    </div>


</html>
