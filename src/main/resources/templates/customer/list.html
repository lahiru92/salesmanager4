<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="content">

    <div th:replace="~{fragments/breadcrumbs :: breadcrumbs(${breadcrumbs})}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3 align-self-center">
        <h1 class="fs-5">Customers</h1>
        <a hx-get="/customers/create" hx-target="#content" class="btn btn-primary">Create Customer</a>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Contact Person</th>
                <th>Phone</th>
                <th>Email</th>
                <th></th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="customer : ${customers}">
                <td th:text="${customer.name}"></td>
                <td th:text="${customer.contactPerson}"></td>
                <td th:text="${customer.phone}"></td>
                <td th:text="${customer.email}"></td>
                <td>
                    <a th:hx-get="@{/customers/{id}/edit (id=${customer.customerId}) }" hx-target="#content"
                        class="btn btn-sm btn-outline-primary">Edit</a>
                    <a th:hx-delete="@{/customers/{id} (id=${customer.customerId}) }"
                        th:hx-headers='|{"${_csrf.headerName}": "${_csrf.token}"}|' hx-target="closest tr"
                        hx-swap="outerHTML swap:0.5s" hx-confirm="Are you sure you want to delete this customer?"
                        class="btn btn-sm btn-outline-danger"> Delete </a>
                </td>
            </tr>
        </tbody>
    </table>

    <div th:replace="~{fragments/pagination :: pagination(target='#content', baseUrl='/customers', page=${page})}"></div>

</div>

</html>
