<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <div th:fragment="content">

        <div th:replace="~{fragments/breadcrumbs :: breadcrumbs(${breadcrumbs})}"></div>

        <h1 class="fs-5" th:if="${mode == 'create'}">Create new customer</h1>
        <h1 class="fs-5" th:if="${mode == 'edit'}">Edit customer</h1>

        <div th:if="${message}">
            <script th:inline="javascript">
                Toastify({
                    text: /*[[${message}]]*/"Undefined",
                    duration: 3000
                }).showToast();
            </script>
        </div>

        <form th:attr="
                hx-post=${mode=='create' ? '/customers' : null},
                hx-put=${mode=='edit' ? '/customers' : null}"
              th:object ="${customer}"
              hx-target="#content">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="col-md-6">
                <input type="hidden" id="customerId" name="customerId" th:value="${customer.customerId}">
                <input type="hidden" id="active" name="active" th:value="${customer.active}">
                <input type="hidden" id="page" name="page" th:value="${page}">
                <input type="hidden" id="size" name="size" th:value="${size}">

                <div class="mb-3">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-control" id="name" name="name" th:value="${customer.name}" required>
                </div>
                <div class="mb-3">
                    <label for="contactPerson" class="form-label">Contact Person</label>
                    <input type="text" class="form-control" id="contactPerson" name="contactPerson" th:value="${customer.contactPerson}" required>
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label">Phone Number</label>
                    <input type="text" class="form-control" id="phone" name="phone" th:value="${customer.phone}" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" th:value="${customer.email}">
                </div>

                <button type="submit" class="btn btn-primary">Submit</button>

            </div>
        </form>

    </div>
</html>
