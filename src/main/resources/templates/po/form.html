<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="content">
    <div th:replace="~{fragments/breadcrumbs :: breadcrumbs(${breadcrumbs})}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3 align-self-center">
        <h1 class="fs-5" th:if="${mode == 'create'}">Create Purchase Order</h1>
        <h1 class="fs-5" th:if="${mode == 'edit'}">Edit Purchase Order</h1>
        
        <div>
            <button class="btn btn-primary"
                    hx-post="/purchase-orders/save-json" 
                    hx-include="#po-form" 
                    hx-target="#content"
                    >Save
            </button> 
        </div>
    </div>

    <div th:if="${message}">
        <script th:inline="javascript">
            Toastify({
                text: /*[[${message}]]*/"Undefined",
                duration: 3000
            }).showToast();
        </script>
    </div>

    <div id="po-form">
    <!-- <form hx-post="/purchase-orders/save-json" 
                  hx-include="[name='_csrf']" 
                  hx-trigger="submit" 
                  hx-target="#content"
                  @submit.prevent="handleSubmit($event)"> -->
        
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="row mb-3">
            <div class="col-sm-3">
                <label for="supplier" class="form-label">Supplier</label>
                <div
                    th:replace="~{fragments/combobox :: combobox('supplier','/suppliers/dropdown', ${ {'supplierId':''} }, '')}">
                </div>
            </div>

            <div class="col-sm-3">
                <label for="orderDate" class="form-label">Date</label>
                <input class="form-control" name="orderDate" type="date" />
            </div>
        </div>

        <div x-data="purchaseOrder()">
            
            <template x-for="(item, index) in items" :key="item.uid">
                <div class="row mb-2">

                    <div class="col">
                        <select x-init="initTomSelect($el, index)"></select>
                    </div>

                    <div class="col">
                        <input type="number" x-model="item.qty" class="form-control" >
                    </div>

                    <div class="col">
                        <input type="number" x-model="item.price" class="form-control">
                    </div>

                    <div class="col">
                        <input type="text" :value="(item.qty * item.price).toFixed(2)" readonly class="form-control">
                    </div>

                    <div class="col">
                        <button type="button" @click="removeItem(index)" class="btn btn-light">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>

                </div>
            </template>

            <button type="button" class="btn btn-secondary" @click="addRow()">
                Add Row
            </button>

            <input type="text" :value="total.toFixed(2)" readonly class="border p-2 bg-gray-100"/>
            <!-- <form hx-post="/purchase-orders/save-json" 
                  hx-include="[name='_csrf']" 
                  hx-trigger="submit" 
                  hx-target="#content"
                  @submit.prevent="handleSubmit($event)"> -->
                <input type="hidden" id="itemsJson" name="itemsJson" :value="JSON.stringify(cleanItems())" />
                <!-- <button type="submit">Save</button> -->
            <!-- </form> -->
        </div>
    </div>
    <!-- </form> -->

</div>

</html>
