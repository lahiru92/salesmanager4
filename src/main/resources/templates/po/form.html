<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="content">
    <div th:replace="~{fragments/breadcrumbs :: breadcrumbs(${breadcrumbs})}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3 align-self-center">
        <h1 class="fs-5" th:if="${mode == 'create'}">Create Purchase Order</h1>
        <h1 class="fs-5" th:if="${mode == 'edit'}">Edit Purchase Order</h1>
        <button class="btn btn-primary" th:attr="
            hx-post=${mode=='create' ? '/purchase-orders' : null},
            hx-put=${mode=='edit' ? '/purchase-orders' : null}" 
          hx-target="#content"  hx-include="#po-form" type="submit">Save</button>
    </div>

    <div th:if="${message}">
        <script th:inline="javascript">
            Toastify({
                text: /*[[${message}]]*/"Undefined",
                duration: 3000
            }).showToast();
        </script>
    </div>

    <form 
          th:object="${po}"
          id="po-form">

        <input type="hidden" id="itemIndex" value="0" />
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="row mb-3">
            <div class="col-sm-3">
                <label for="supplier" class="form-label">Supplier</label>
                <div
                    th:replace="~{fragments/combobox :: combobox('supplier','/suppliers/dropdown', ${ {'supplierId':''} }, '')}">
                </div>
            </div>

            <div class="col-sm-3">
                <label for="orderDate" class="form-label">Date</label>
                <input class="form-control" type="date" th:field="*{orderDate}" />
            </div>
        </div>

        <div x-data="{ 
                        items: [], 
                        getNextIndex() { return this.items.length; },
                        
                        addItem(newId, newPrice, newName) {
                            // Check if ID already exists in our items array
                            let existing = this.items.find(i => i.id === newId);
                            
                            if (existing) {
                                existing.qty += 1; // Merge quantity
                            } else {
                                this.items.push({
                                    id: Date.now(), // Temporary ID for tracking
                                    productId: newId,
                                    qty: 0,
                                    price: newPrice,
                                    name: newName
                                });
                            }
                        },

                        removeItem(index) {
                            this.items.splice(index, 1);
                        },

                        get grandTotal() {
                            return this.items.reduce((sum, item) => sum + (item.qty * item.price), 0).toFixed(2);
                        }
                    }">
            <table class="table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Qty</th>
                        <th>Price</th>
                        <th>Total</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="(item, index) in items" :key="item.id">
                        <tr class="invoice-row">
                            <td>
                                <select :name="'items[' + index + '].itemId'" x-model="item.itemId"
                                    x-init="initTomSelect($el, item)">
                                    <option value=""></option>
                                </select>
                            </td>
                            <td>
                                <input type="number" :name="'items[' + index + '].quantity'" x-model.number="item.qty"
                                     class="form-control">
                            </td>
                            <td>
                                <input type="number" :name="'items[' + index + '].price'" x-model.number="item.price"
                                    step="0.01" class="form-control">
                            </td>
                            <td class="align-middle">
                                $<span x-text="(item.qty * item.price).toFixed(2)">0.00</span>
                            </td>
                            <td>
                                <button type="button" @click="removeItem(index)" class="btn btn-danger">×</button>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>

            <button type="button" @click="addItem({ id: Date.now() })" class="btn btn-secondary">Add Item</button>

            <div class="mt-3">
                <strong>Grand Total: $<span x-text="grandTotal"></span></strong>
            </div>
        </div>
    </form>

</div>

</html>
