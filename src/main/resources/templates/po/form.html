<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="content" x-data="purchaseOrder()">
    <div th:replace="~{fragments/breadcrumbs :: breadcrumbs(${breadcrumbs})}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3 align-self-center">
        <h1 class="fs-5" th:if="${mode == 'create'}">Create Purchase Order</h1>
        <h1 class="fs-5" th:if="${mode == 'edit'}">Edit Purchase Order</h1>

        <form hx-include="#po-form" hx-post="/purchase-orders/save-json" hx-target="#content" @htmx:confirm="handleHtmxSubmit">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" id="itemsJson" name="itemsJson" :value="JSON.stringify(cleanItems())" />
            <input type="submit" class="btn btn-primary" value="Save">
        </form>
    </div>
    <div class="text-danger mb-2" x-text="errors.form"></div>
    <div th:if="${message}">
        <script th:inline="javascript">
            Toastify({
                text: /*[[${message}]]*/"Undefined",
                duration: 3000
            }).showToast();
        </script>
    </div>

    <div id="po-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" id="itemsJson" name="itemsJson" :value="JSON.stringify(cleanItems())" />

        <div class="card p-2 mb-3 bg-light">
            <div class="row mb-3">
                <div class="col-sm-3">
                    <label for="supplier" class="form-label">Supplier</label>
                    <div
                        th:replace="~{fragments/combobox :: combobox('supplier','/suppliers/dropdown', ${ {'supplierId':''} }, '')}">
                    </div>
                </div>
    
                <div class="col-sm-3">
                    <label for="orderDate" class="form-label">Date</label>
                    <input class="form-control" name="orderDate" type="date" />
                </div>
            </div>
        </div>

        <div class="card p-1 bg-light mb-3">
            <table class="table table-light table-borderless table-hover">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Qty</th>
                        <th>Price</th>
                        <th>Total</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="(item, index) in items" :key="item.uid">
                        <tr>

                            <td>
                                <select :name="`items[${index}].itemId`" x-init="initTomSelect($el, index)"></select>
                                <div class="text-danger small"  x-text="errors.items[index]?.itemId"></div>
                            </td>

                            <td>
                                <input :name="`items[${index}].qty`" type="number" x-model="item.qty" class="form-control">
                                <div class="text-danger small" x-text="errors.items[index]?.qty"></div>
                            </td>

                            <td>
                                <input :name="`items[${index}].price`" type="number" x-model="item.price" class="form-control" @blur="validate()">
                                <div class="text-danger small" x-text="errors.items[index]?.price"></div>
                            </td>

                            <td>
                                <input type="text" :value="(item.qty * item.price).toFixed(2)" readonly class="form-control">
                            </td>

                            <td>
                                <button type="button" @click="removeItem(index)" class="btn btn-light">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>

                        </tr>
                    </template>
                </tbody>
            </table>
            
        </div>

        <button type="button" class="btn btn-secondary" @click="addRow()">
                Add Row
        </button>

        <input type="text" :value="total.toFixed(2)" readonly class="border p-2 bg-gray-100" />
    </div>
</div>

</html>
