<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="content">
    <div th:replace="~{fragments/breadcrumbs :: breadcrumbs(${breadcrumbs})}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3 align-self-center">
        <h1 class="fs-5" th:if="${mode == 'create'}">Create Purchase Order</h1>
        <h1 class="fs-5" th:if="${mode == 'edit'}">Edit Purchase Order</h1>
    </div>

    <div th:if="${message}">
        <script th:inline="javascript">
            Toastify({
                text: /*[[${message}]]*/"Undefined",
                duration: 3000
            }).showToast();
        </script>
    </div>

    <div x-data="poForm()">
        <form>
            
            <div>
                <input type="text" name="supplierId" placeholder="Supplier id" />
                <input type="date" name="orderDate" placeholder="Order date" />
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Product ID</th>
                        <th>Quantity</th>
                        <th>Unit Price</th>
                        <th>Sub Total</th>
                        <th></th>
                    </tr>
                </thead>

                <tbody>
                    <template x-for="(item, index) in items" :key="index">
                        <tr>
                            <td><input type="text" name="items[${index}].itemId" x-model="item.itemId" placeholder="Item id" /></td>
                            <td><input type="number" name="items[${index}].quantity" x-model.number="item.quantity" placeholder="Quantity" /></td>
                            <td><input type="number" name="items[${index}].unitPrice" x-model.number="item.unitPrice" placeholder="Unit price" /></td>
                            <td><input type="number" name="items[${index}].subTotal" x-model.number="item.subTotal" placeholder="Sub total" readonly /></td>
                            <td><button type="button">Remove</button></td>
                        </tr>
                    </template>
                </tbody>
                <tfoot>
                    <tr>
                        <td><input type=text placeholder="Item Id"/></td>
                        <td><input type=number placeholder="Quantity"/></td>
                        <td><input type=number placeholder="Unit Price"/></td>
                        <td><input type=number placeholder="Sub Total" readonly/></td>
                        <td><button type="button">Add Item</button></td>
                    </tr>
                </tfoot>
            </table>
        </form>
    </div>
    
    <script th:inline="javascript">
        function poForm() {
            return {
                items:[] 
            }
        }
    </script>

    
</div>

</html>
