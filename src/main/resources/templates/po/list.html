<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="content">
    <input type="hidden" id="csrf" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    <div th:replace="~{fragments/breadcrumbs :: breadcrumbs(${breadcrumbs})}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3 align-self-center">
        <h1 class="fs-5">Purchase Orders</h1>
        <a hx-get="/purchase-orders/create" hx-target="#content" class="btn btn-primary">Create Purchase Order</a>
    </div>

    <div th:if="${toastMessage}">
        <script th:inline="javascript">
            Toastify({
                text: /*[[${toastMessage}]]*/"Undefined",
                duration: 3000
            }).showToast();
        </script>
    </div>

    <div class="card overflow-hidden mb-3">
        <div class="table-responsive">
            <table class="table mb-0">
                <thead class="table-secondary">
                    <tr>
                        <th>ID</th>
                        <th>Supplier</th>
                        <th>Order Date</th>
                        <th>Status</th>
                        <th>Created By</th>
                        <th>Created At</th>
                        <th class="text-end">Total</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="po : ${purchaseOrders}">
                        <td th:text="${po.id}">1</td>
                        <td th:text="${po.supplierName}">Supplier Name</td>
                        <td th:text="${po.orderDate}">2024-01-01</td>
                        <td>
                            <span th:if="${po.status == 'DRAFT'}" class="badge text-bg-dark">Draft</span>
                            <span th:if="${po.status == 'SENT'}" class="badge text-bg-warning">Pending Approval</span>
                            <span th:if="${po.status == 'APPROVED'}" class="badge text-bg-success">Approved</span>
                            <span th:if="${po.status == 'RECEIVED'}" class="badge text-bg-primary">Received</span>
                        </td>
                        <td th:text="${po.createdByName}">Employee Name</td>
                        <td th:text="${#temporals.format(po.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01 12:00</td>
                        <td class="text-end" th:text="${#numbers.formatDecimal(po.total, 1, 'COMMA', 2, 'POINT')}">100,000.00</td>
                        <td>
                            <button class="btn btn-sm btn-light" th:hx-get="@{/purchase-orders/{id}(id=${po.id})}" hx-target="#content" title="View"><i class="bi bi-eye"></i></button>
                            <button th:if="${po.status == 'DRAFT'}" class="btn btn-sm btn-light" th:hx-get="@{/purchase-orders/edit/{id}(id=${po.id})}" hx-target="#content" title="Edit"><i class="bi bi-pencil-square"></i></button>
                            <button th:if="${po.status == 'SENT'}" class="btn btn-sm btn-light" th:hx-post="@{/purchase-orders/{id}/approve(id=${po.id})}" hx-target="#content" hx-include="#csrf" hx-confirm="Approve this purchase order?" title="Approve"><i class="bi bi-check-lg"></i></button>
                            <a th:if="${po.status == 'APPROVED'}" th:hx-get="@{/grn/create(purchaseOrderId=${po.id})}" hx-target="#content" class="btn btn-sm btn-primary">Create GRN</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</html>
