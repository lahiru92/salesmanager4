<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="content">

    <div th:replace="~{fragments/breadcrumbs :: breadcrumbs(${breadcrumbs})}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3 align-self-center">
        <h1 class="fs-5">Income / Expense Categories</h1>
    </div>

    <div th:if="${message}">
        <script th:inline="javascript">
            Toastify({
                text: /*[[${message}]]*/"Undefined",
                duration: 3000
            }).showToast();
        </script>
    </div>

    <form hx-post="/ledger/categories" hx-target="#content" class="card mb-3">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="card-body row align-items-end g-2">
            <div class="col-4">
                <label class="form-label" for="name">Name</label>
                <input type="text" class="form-control" id="name" name="name" required>
            </div>
            <div class="col-auto">
                <label class="form-label" for="cat-kind">Type</label>
                <select class="form-select" id="cat-kind" name="kind">
                    <option value="INCOME">Income</option>
                    <option value="EXPENSE">Expense</option>
                </select>
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-primary">Add Category</button>
            </div>
        </div>
    </form>

    <div class="card overflow-hidden">
        <div class="card-body table-responsive p-0">
            <table class="table m-0 align-middle">
                <thead>
                    <tr class="text-uppercase">
                        <th>Name</th>
                        <th>Type</th>
                        <th>Status</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(categories)}">
                        <td colspan="4" class="text-secondary">No categories yet. Add the first one above.</td>
                    </tr>
                    <tr th:each="cat : ${categories}">
                        <td th:text="${cat.name}"></td>
                        <td>
                            <span th:if="${cat.kind.name() == 'INCOME'}" class="badge text-bg-success">Income</span>
                            <span th:if="${cat.kind.name() == 'EXPENSE'}" class="badge text-bg-danger">Expense</span>
                        </td>
                        <td>
                            <span th:if="${cat.active}" class="badge text-bg-light">Active</span>
                            <span th:unless="${cat.active}" class="badge text-bg-secondary">Disabled</span>
                        </td>
                        <td>
                            <a th:if="${cat.active}" th:hx-delete="@{/ledger/categories/{id} (id=${cat.id})}"
                                th:hx-headers='|{"${_csrf.headerName}": "${_csrf.token}"}|'
                                hx-target="#content" hx-confirm="Disable this category?"
                                class="btn btn-sm btn-outline-danger">Disable</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</html>
