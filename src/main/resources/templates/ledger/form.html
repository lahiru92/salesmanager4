<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="content" th:object="${entry}" data-init="ledger">

    <div th:replace="~{fragments/breadcrumbs :: breadcrumbs(${breadcrumbs})}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3 align-self-center">
        <h1 class="fs-5">New Income / Expense Entry</h1>
        <div id="action-bar">
            <a hx-post="/ledger" hx-target="#content" hx-include="#ledger-form" class="btn btn-primary">Save Entry</a>
        </div>
    </div>

    <div th:if="${#fields.hasGlobalErrors()}">
        <div th:each="err : ${#fields.globalErrors()}">
            <div class="alert alert-danger d-flex align-items-center" role="alert">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span>&nbsp</span>
                <span th:text="${err}"></span>
            </div>
        </div>
    </div>

    <form id="ledger-form" hx-post="/ledger" hx-target="#content" class="needs-validation" novalidate>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div class="row p-2 mb-1">
            <div class="col-3">
                <label class="form-label" for="entryDate">Date</label>
                <input type="date" class="form-control" th:field="*{entryDate}" required>
                <div class="invalid-feedback">Date is required</div>
            </div>
            <div class="col-3">
                <label class="form-label" for="categoryId">Category</label>
                <select class="form-select" th:field="*{categoryId}" required>
                    <option value="">Select a category</option>
                    <optgroup label="Income">
                        <option th:each="cat : ${incomeCategories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                    </optgroup>
                    <optgroup label="Expense">
                        <option th:each="cat : ${expenseCategories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                    </optgroup>
                </select>
                <div class="invalid-feedback">Category is required</div>
            </div>
            <div class="col-3">
                <label class="form-label" for="amount">Amount</label>
                <input type="number" step="0.01" min="0.01" class="form-control text-end" th:field="*{amount}" required>
                <div class="invalid-feedback">Amount must be greater than zero</div>
            </div>
            <div class="col-3">
                <label class="form-label" for="paymentMethod">Payment Method</label>
                <select class="form-select" th:field="*{paymentMethod}" required>
                    <option value="CASH">Cash</option>
                    <option value="CHEQUE">Cheque</option>
                    <option value="BANK_TRANSFER">Bank Transfer</option>
                </select>
            </div>
        </div>

        <div class="row p-2 mb-3">
            <div class="col-3">
                <label class="form-label" for="ledger-supplier">Supplier (for commissions)</label>
                <select id="ledger-supplier" name="supplierId" placeholder="Optional" class="form-select">
                </select>
            </div>
            <div class="col-6">
                <label class="form-label" for="description">Description</label>
                <input type="text" class="form-control" th:field="*{description}">
            </div>
        </div>
    </form>

</div>
</html>
